services:
  postgres-sso:
    image: postgres:16-alpine
    container_name: tecopos-postgres-sso
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_SSO_DB:-sso_db}
      POSTGRES_USER: ${POSTGRES_SSO_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SSO_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_SSO_PORT:-5432}:5432'
    volumes:
      - postgres-sso-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_SSO_USER:-postgres} -d ${POSTGRES_SSO_DB:-sso_db}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tecopos-internal

  postgres-bank:
    image: postgres:16-alpine
    container_name: tecopos-postgres-bank
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_BANK_DB:-bank_db}
      POSTGRES_USER: ${POSTGRES_BANK_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_BANK_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_BANK_PORT:-5433}:5432'
    volumes:
      - postgres-bank-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_BANK_USER:-postgres} -d ${POSTGRES_BANK_DB:-bank_db}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tecopos-internal

  sso:
    build:
      context: .
      dockerfile: apps/sso/Dockerfile
    container_name: tecopos-sso
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SSO_PORT: ${SSO_PORT:-3001}
      SSO_DATABASE_URL: postgres://${POSTGRES_SSO_USER:-postgres}:${POSTGRES_SSO_PASSWORD:-postgres}@postgres-sso:5432/${POSTGRES_SSO_DB:-sso_db}
      JWT_SECRET: ${JWT_SECRET:-replace-with-secure-shared-jwt-secret}
      SSO_BCRYPT_ROUNDS: ${SSO_BCRYPT_ROUNDS:-10}
      SSO_AUTH_RATE_LIMIT_TTL_MS: ${SSO_AUTH_RATE_LIMIT_TTL_MS:-60000}
      SSO_AUTH_RATE_LIMIT_LIMIT: ${SSO_AUTH_RATE_LIMIT_LIMIT:-5}
    ports:
      - '${SSO_PORT:-3001}:3001'
    depends_on:
      postgres-sso:
        condition: service_healthy
    networks:
      - tecopos-internal

  bank-accounts:
    build:
      context: .
      dockerfile: apps/bank-accounts/Dockerfile
    container_name: tecopos-bank-accounts
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BANK_PORT: ${BANK_PORT:-3002}
      BANK_DATABASE_URL: postgres://${POSTGRES_BANK_USER:-postgres}:${POSTGRES_BANK_PASSWORD:-postgres}@postgres-bank:5432/${POSTGRES_BANK_DB:-bank_db}
      MOCKAPI_BASE_URL: ${MOCKAPI_BASE_URL:-https://mockapi.io}
      MOCKAPI_TIMEOUT_MS: ${MOCKAPI_TIMEOUT_MS:-2000}
      INTERNAL_SIGNATURE_SECRET: ${INTERNAL_SIGNATURE_SECRET:-replace-with-secure-internal-signature-secret}
      INTERNAL_SIGNATURE_MAX_SKEW_SECONDS: ${INTERNAL_SIGNATURE_MAX_SKEW_SECONDS:-90}
    ports:
      - '${BANK_PORT:-3002}:3002'
    depends_on:
      postgres-bank:
        condition: service_healthy
    networks:
      - tecopos-internal

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: tecopos-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GATEWAY_PORT: ${GATEWAY_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-replace-with-secure-shared-jwt-secret}
      SSO_SERVICE_URL: http://sso:3001
      BANK_SERVICE_URL: http://bank-accounts:3002
      INTERNAL_SIGNATURE_SECRET: ${INTERNAL_SIGNATURE_SECRET:-replace-with-secure-internal-signature-secret}
      INTERNAL_SIGNATURE_MAX_SKEW_SECONDS: ${INTERNAL_SIGNATURE_MAX_SKEW_SECONDS:-90}
      GATEWAY_RATE_LIMIT_TTL_MS: ${GATEWAY_RATE_LIMIT_TTL_MS:-60000}
      GATEWAY_RATE_LIMIT_LIMIT: ${GATEWAY_RATE_LIMIT_LIMIT:-100}
    ports:
      - '${GATEWAY_PORT:-3000}:3000'
    depends_on:
      sso:
        condition: service_started
      bank-accounts:
        condition: service_started
    networks:
      - tecopos-internal

networks:
  tecopos-internal:
    driver: bridge

volumes:
  postgres-sso-data:
  postgres-bank-data:
